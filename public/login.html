<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang đăng nhập</title>
    
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="browser-mockup">
    
<div style="font-size: 11px; color: #999; margin-bottom: 3px;">Lập trình web </div>
    <div class="address-bar"> [ http://php.local ] </div>

    <div class="nav-header">
        Home | <strong>Đăng nhập</strong> | Đăng ký
    </div>

    <div class="main-box">
        <h3>Màn hình đăng nhập</h3>
        
        <div class="input-row">
            <label>Username</label>
            <input type="text">
        </div>

        <div class="input-row">
            <label>Mật khẩu</label>
            <input type="password">
        </div>

        <div style="margin-left: 120px; font-size: 13px;">
            <input type="checkbox" checked> Ghi nhớ đăng nhập
        </div>

        <div style="margin-top: 40px; overflow: hidden;">
            <a href="#" style="color: #0056b3; font-size: 13px; text-decoration: none;">Quên mật khẩu</a>
            <button class="btn-action">Đăng nhập</button>
        </div>
    </div>

    <div class="page-footer">
        HaiDang
    </div>
</div>

</body>
</html>
